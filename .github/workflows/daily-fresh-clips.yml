name: Daily Fresh Clips

# Free-tier runner. Public repo → unlimited GitHub-hosted Actions minutes.
# The actual generator (Remotion templates + scripts) lives in the PRIVATE
# Loomee repo and is cloned at runtime with GH_PAT, so no IP is
# ever exposed here. Only schedule + workflow_dispatch trigger this (neither
# is fork-triggerable), so secrets and the MAM backlog can't be abused.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'How many new clips to generate'
        required: false
        default: '3'
      categories:
        description: 'Restrict to comma-separated categories (blank = any)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COUNT: ${{ inputs.count || '3' }}
      AFFIRMATION_CATEGORIES: ${{ inputs.categories || '' }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Clone private generator
        run: |
          git clone --depth 1 \
            "https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository_owner }}/Loomee.git" work

      - name: Cache Remotion Chrome
        uses: actions/cache@v4
        with:
          path: ~/.cache/remotion
          key: remotion-chrome-${{ runner.os }}-v1

      - name: Install system ffmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      - name: Fetch music assets from MAM CDN
        working-directory: work/generator
        run: |
          mkdir -p public/music
          for file in nature_rain.mp3 nature_river.mp3 nature_forest.mp3 nature_birds.mp3 nature_waves.mp3; do
            curl -fsSL "https://21media.online/loomee-music/$file" -o "public/music/$file"
            printf '  ✓ %s (%s bytes)\n' "$file" "$(wc -c < public/music/$file)"
          done

      - name: npm ci
        working-directory: work/generator
        run: npm ci --no-audit --no-fund

      - name: Verify MAM enqueue auth (fail fast)
        env:
          BUFFER_PUSH_SECRET: ${{ secrets.BUFFER_PUSH_SECRET }}
          MAM_BASE: 'https://21media-mam.vercel.app'
        run: |
          CODE=$(curl -sS -o /dev/null -w '%{http_code}' \
            -X POST "$MAM_BASE/api/loomee/buffer/enqueue" \
            -H "Authorization: Bearer $BUFFER_PUSH_SECRET" \
            -H 'Content-Type: application/json' -d '{}')
          echo "enqueue auth probe → HTTP $CODE"
          if [ "$CODE" = "401" ]; then
            echo "::error::BUFFER_PUSH_SECRET is wrong (401). Fix the repo secret."
            exit 1
          fi

      - name: Start render server
        working-directory: work/generator
        env:
          MAM_BASE: 'https://21media-mam.vercel.app'
        run: |
          nohup node server.mjs > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          for i in $(seq 1 45); do
            if curl -fsS http://localhost:3002/api/health > /dev/null 2>&1; then
              echo "✓ render server up after ${i}*2s"
              exit 0
            fi
            sleep 2
          done
          echo "server failed to start. log:"
          tail -50 /tmp/server.log
          exit 1

      - name: Generate fresh clips
        working-directory: work/generator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          MAM_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.MAM_SUPABASE_SERVICE_ROLE_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          BUFFER_PUSH_SECRET: ${{ secrets.BUFFER_PUSH_SECRET }}
          MAM_BASE: 'https://21media-mam.vercel.app'
          LOCAL_SERVER: http://localhost:3002
        run: node scripts/generate-fresh-cloud.mjs

      - name: Tail server log on failure
        if: failure()
        run: tail -200 /tmp/server.log || true
